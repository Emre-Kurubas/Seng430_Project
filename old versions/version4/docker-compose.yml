version: "3.9"

services:
  # ─── All-in-one: React frontend + Express backend ──────────────
  healthai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthai-app
    ports:
      - "3000:3000"   # Frontend (serve)
      - "3001:3001"   # Backend  (Express)
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGIN=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
